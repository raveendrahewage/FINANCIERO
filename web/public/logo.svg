<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="walletFlap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff" />
      <stop offset="100%" stop-color="#bfdbfe" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-opacity="0.25" />
    </filter>
  </defs>
  
  <!-- Outer perfectly rounded background -->
  <circle cx="256" cy="256" r="256" fill="url(#brandGradient)" />
  
  <!-- Inner Wallet Icon (centered) -->
  <g transform="translate(106, 116)" filter="url(#shadow)">
    <!-- Main wallet body -->
    <rect x="0" y="40" width="300" height="200" rx="36" fill="#ffffff" />
    <!-- Wallet top flap -->
    <path d="M0 76 C0 56.118 16.118 40 36 40 H264 C283.882 40 300 56.118 300 76 V130 L150 170 L0 130 Z" fill="url(#walletFlap)" />
    <!-- Wallet Button -->
    <circle cx="240" cy="140" r="24" fill="url(#brandGradient)" />
  </g>
</svg>
